<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>kalit-code</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- ── Sidebar: conversation history ── -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <span class="brand">kalit-code</span>
        <button class="icon-btn" id="newChatBtn" title="New chat">＋</button>
      </div>
      <div class="conv-list" id="convList"></div>
      <div class="sidebar-foot">
        <button class="ghost-row" id="settingsBtn">⚙ Settings</button>
      </div>
    </aside>

    <!-- ── Main: chat ── -->
    <section class="main">
      <header class="topbar">
        <select id="modelSelect" class="model-select" title="model"></select>
        <span class="srv-dot" id="srvDot" title="server status"></span>
        <div class="spacer"></div>
      </header>

      <main id="messages" class="messages">
        <div class="empty" id="empty">
          <h1>kalit-code</h1>
          <p>Your own model, full PC access. Start a chat below.</p>
        </div>
      </main>

      <footer class="composer">
        <div class="ctx" id="ctx" title="context used before auto-compaction">
          <svg viewBox="0 0 36 36" class="ctx-ring">
            <circle class="ctx-track" cx="18" cy="18" r="15.9155"></circle>
            <circle class="ctx-fill" id="ctxFill" cx="18" cy="18" r="15.9155" stroke-dasharray="0 100" stroke-dashoffset="25"></circle>
          </svg>
          <span class="ctx-label" id="ctxLabel">0%</span>
        </div>
        <textarea id="input" rows="1" placeholder="Message kalit-code…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button id="sendBtn" class="send-btn" title="Send">➤</button>
        <button id="stopBtn" class="stop-btn" title="Stop" hidden>■</button>
      </footer>
    </section>
  </div>

  <!-- ── Settings modal: full options ── -->
  <div class="modal-backdrop" id="settings" hidden>
    <div class="modal">
      <h2>Settings</h2>

      <h3>Connection</h3>
      <label>Model server URL
        <input id="cfgServerUrl" type="text" placeholder="http://localhost:4747" />
      </label>
      <label>Server token
        <input id="cfgToken" type="password" placeholder="SERVER_TOKEN" />
      </label>
      <span class="hint" id="cfgHint"></span>

      <h3>Agent</h3>
      <label>Default model
        <select id="cfgModel"></select>
      </label>
      <label>Working directory (full access here)
        <input id="cfgCwd" type="text" placeholder="/Users/you/project" />
      </label>
      <label>Autonomy
        <select id="cfgPerm">
          <option value="bypassPermissions">bypassPermissions — fully autonomous</option>
          <option value="acceptEdits">acceptEdits — auto-accept edits</option>
          <option value="default">default — ask</option>
          <option value="plan">plan — propose, don't act</option>
        </select>
      </label>
      <label>Context window (tokens)
        <input id="cfgCtx" type="number" min="1000" step="1000" placeholder="200000" />
      </label>

      <div class="modal-actions">
        <button id="cfgCancel" class="ghost">Cancel</button>
        <button id="cfgSave" class="primary">Save</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
